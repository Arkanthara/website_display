name: test-project

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: build dependencies
        run: |
          ls -l 
          pwd
          cd frontend
          npm install
      - name: test
        run: |
          cd frontend
          npm test
      - name: sonarqube
        run: |
          cd frontend
          npm test ./frontend

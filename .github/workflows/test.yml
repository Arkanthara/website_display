name: test-project

on:
  push:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: build dependencies
        working-directory: ./frontend
        run: npm install
      - name: test
        working-directory: ./frontend
        run: npm test
      - name: sonarqube
        working-directory: ./frontend
        run: npm test ./frontend

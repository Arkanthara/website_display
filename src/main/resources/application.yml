spring:
  config:
    import: optional:file:.env[.properties]
  application:
    name: backend
  datasource:
    url: ${DB_HOST}
    name: ${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PWD}
    port: ${DB_PORT}
    driverClassName: ${DB_DRIVER}
  jpa:
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
